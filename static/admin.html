<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Watch Together Admin</title>
    <link rel="stylesheet" href="/static/admin.css?v=20260319a" />
  </head>
  <body>
    <div class="shell">
      <header class="header">
        <h1>Admin Dashboard</h1>
        <button id="logoutBtn" class="hidden">Logout</button>
      </header>

      <section id="loginCard" class="card login-card">
        <h2>Admin Login</h2>
        <form id="loginForm" class="form">
          <input id="adminUser" placeholder="Admin username" required />
          <input id="adminPass" placeholder="Admin password" required type="password" />
          <button type="submit">Enter Dashboard</button>
        </form>
        <p id="loginMsg" class="msg"></p>
      </section>

      <main id="dashboard" class="hidden">
        <section class="grid cards-grid">
          <article class="card metric"><h3>Users</h3><p id="metricUsers">-</p></article>
          <article class="card metric"><h3>Rooms</h3><p id="metricRooms">-</p></article>
          <article class="card metric"><h3>Sessions</h3><p id="metricSessions">-</p></article>
          <article class="card metric"><h3>Media</h3><p id="metricMedia">-</p></article>
        </section>

        <section class="grid split">
          <article class="card">
            <div class="title-row"><h3>User Management</h3><button id="refreshUsers">Refresh</button></div>
            <form id="createUserForm" class="inline-form">
              <input id="newUsername" placeholder="username" minlength="3" required />
              <input id="newPassword" type="password" placeholder="password" minlength="6" required />
              <button type="submit">Create User</button>
            </form>
            <div id="usersTable" class="table-wrap"></div>
          </article>

          <article class="card">
            <div class="title-row"><h3>Media Management</h3><button id="refreshMedia">Refresh</button></div>
            <form id="importForm" class="inline-form">
              <input id="importFile" type="file" accept="video/mp4,video/webm,video/ogg,video/quicktime,.mp4,.webm,.ogg,.mov" required />
              <button type="submit">Import Video/Audio</button>
            </form>
            <p id="importMsg" class="msg"></p>
            <div id="mediaTable" class="table-wrap"></div>
          </article>
        </section>
      </main>
    </div>

    <script src="/static/admin.js?v=20260319a" defer></script>
  </body>
  </html>
